name: CI

# Run on every push to any branch, and on PRs targeting master
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:

  # ── Job 1: Frontend lint + TypeScript check ─────────────────
  lint-frontend:
    name: "Frontend — Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ── Job 2: Backend tests ─────────────────────────────────────
  test-backend:
    name: "Backend — Pytest"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Job 3: Docker build smoke test ──────────────────────────
  # Verifies that both Dockerfiles produce a valid image.
  # Images are NOT pushed here — that happens in the CD workflow.
  build-docker:
    name: "Docker — Build Check"
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Image tags use a local name — no registry login required in CI.
      # The CD workflow pushes to Azure Container Registry (ACR).
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: f1-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: f1-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Terraform validate ────────────────────────────────
  # Checks that the Terraform configuration is syntactically valid and
  # internally consistent. Runs WITHOUT connecting to any backend
  # (-backend=false), so no secrets are required in CI.
  terraform-validate:
    name: "Terraform — Validate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      # Init without a backend so no remote state credentials are needed.
      # This still downloads providers and validates the configuration.
      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      # Fail if any .tf file is not correctly formatted.
      # Run "terraform fmt" locally to auto-fix formatting.
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # Validates types, references, and required arguments — catches errors
      # before they reach the real deploy step in CD.
      - name: Terraform Validate
        run: terraform validate

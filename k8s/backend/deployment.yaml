apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: f1-dashboard
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  # Zero-downtime rolling update: bring up new pods before killing old ones
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Image is pulled from Azure Container Registry (ACR).
          # Tag is replaced with the exact git SHA by the CD workflow.
          # AKS pulls via managed identity — no imagePullSecrets required.
          image: f1dashboardacr.azurecr.io/f1-intelligence-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: cache-volume
              mountPath: /app/cache
      volumes:
        # EmptyDir is ephemeral — replace with a PersistentVolumeClaim
        # if you want the cache to survive pod restarts.
        - name: cache-volume
          emptyDir: {}

apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: f1-dashboard
  labels:
    app: backend
spec:
  # ClusterIP exposes the service only inside the cluster.
  # The Nginx ingress routes external traffic here.
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000

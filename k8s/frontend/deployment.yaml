apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: f1-dashboard
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Image is pulled from Azure Container Registry (ACR).
          # Tag is replaced with the exact git SHA by the CD workflow.
          # AKS pulls via managed identity — no imagePullSecrets required.
          image: f1dashboardacr.azurecr.io/f1-intelligence-frontend:latest
          ports:
            - containerPort: 3000
          # NEXT_PUBLIC_API_URL is baked into the image at build time (see CD workflow).
          # This env var is kept here only for documentation clarity.
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

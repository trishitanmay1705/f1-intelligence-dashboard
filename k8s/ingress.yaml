# ── Nginx Ingress ─────────────────────────────────────────────
# Requires the nginx ingress controller to be installed in your cluster.
# Install it with:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
#
# How traffic flows:
#   Browser  →  Ingress (yourdomain.com)
#     /api/*  →  backend:8000   (FastAPI)
#     /*      →  frontend:3000  (Next.js)
#
# Replace "yourdomain.com" with your actual domain (or use the
# external IP of the LoadBalancer for quick testing).

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: f1-dashboard-ingress
  namespace: f1-dashboard
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Remove the /api prefix before forwarding to the backend
    # (backend routes already include /api/v1/... so we keep it)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: yourdomain.com          # ← replace with your domain
      http:
        paths:
          # All /api/* traffic → backend
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          # Everything else → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
  # Uncomment and configure for TLS (cert-manager recommended)
  # tls:
  #   - hosts:
  #       - yourdomain.com
  #     secretName: f1-dashboard-tls

# ── Nginx Ingress with TLS ──────────────────────────────────────────────────
# Deployed on AKS. Requires the following pre-installed cluster add-ons:
#
#  1. NGINX Ingress Controller
#     kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
#     Wait for the LoadBalancer external IP:
#     kubectl get svc ingress-nginx-controller -n ingress-nginx
#     Point your domain DNS A record to this IP.
#
#  2. cert-manager (automatic TLS via Let's Encrypt)
#     kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#     Then apply k8s/cert-manager/cluster-issuer.yaml (see that file).
#
# Traffic flow:
#   Browser  ──HTTPS──►  LoadBalancer (AKS)  ──►  Nginx Ingress
#     /api/*  →  backend:8000   (FastAPI)
#     /*      →  frontend:3000  (Next.js)
#
# Replace "f1dashboard.yourdomain.com" with your actual domain.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: f1-dashboard-ingress
  namespace: f1-dashboard
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # cert-manager sees this annotation and automatically requests a
    # Let's Encrypt certificate for the host(s) listed in spec.tls.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Redirect all plain HTTP traffic to HTTPS automatically.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - f1dashboard.yourdomain.com   # ← replace with your domain
      secretName: f1-dashboard-tls     # cert-manager populates this Secret
  rules:
    - host: f1dashboard.yourdomain.com  # ← replace with your domain
      http:
        paths:
          # All /api/* traffic → backend
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          # Everything else → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
